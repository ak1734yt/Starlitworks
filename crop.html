<!DOCTYPE html>
<html>
<body>
<canvas id="canvas"></canvas>
<script>
const img = new Image();
img.onload = function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  // Define crop area (approximately the middle 40% height)
  const cropY = img.height * 0.3;
  const cropHeight = img.height * 0.4;
  
  canvas.width = img.width;
  canvas.height = cropHeight;
  
  ctx.drawImage(img, 0, cropY, img.width, cropHeight, 0, 0, img.width, cropHeight);
  
  // Trigger download or just let the subagent see it
  const link = document.createElement('a');
  link.download = 'cropped_banner.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
};
img.src = 'media__1778612754832.jpg';
</script>
</body>
</html>
